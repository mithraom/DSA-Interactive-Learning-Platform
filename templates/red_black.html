<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Red-Black Tree Visualization</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
body {
  margin: 0; font-family: 'Poppins', 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b, #020617);
  display: flex; justify-content: center; align-items: flex-start;
  min-height: 100vh; color: #e2e8f0; padding: 30px 0;
}
.container {
  background: rgba(255,255,255,0.05); padding: 40px; border-radius: 24px;
  box-shadow: 0 25px 70px rgba(0,0,0,0.7), inset 0 0 30px rgba(255,255,255,0.05);
  text-align: center; width: 95%; max-width: 1100px;
  backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08);
}
h1 { font-size: 42px; font-weight: 600; margin-bottom: 20px; color: #e0e7ff; text-shadow: 0 4px 20px rgba(99,102,241,0.4); }
input[type="text"] {
  padding: 13px 15px; margin: 6px; border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.08);
  color: #e2e8f0; font-size: 16px; outline: none; width: 280px;
  transition: 0.3s; font-family: 'Poppins', sans-serif;
}
input[type="text"]:focus { border-color: #6366f1; box-shadow: 0 0 15px rgba(99,102,241,0.5); }
input[type="text"]::placeholder { color: #94a3b8; }
input[type="range"] { width: 160px; vertical-align: middle; }
button {
  padding: 13px 26px; margin: 6px; border: none; border-radius: 14px;
  background: linear-gradient(135deg, #6366f1, #06b6d4); color: white;
  cursor: pointer; transition: 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  font-weight: 600; font-size: 16px; font-family: 'Poppins', sans-serif;
}
button:hover { transform: translateY(-4px) scale(1.05); box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
.controls { margin-bottom: 20px; }
.controls label { font-size: 16px; color: #cbd5e1; }
canvas {
  margin-top: 20px; background: rgba(255,255,255,0.04); border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.7), inset 0 0 20px rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08); display: block; margin-left: auto; margin-right: auto;
}
.legend {
  display: flex; justify-content: center; gap: 24px; margin: 16px 0; flex-wrap: wrap;
}
.legend-item { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 500; }
.legend-dot { width: 18px; height: 18px; border-radius: 50%; }
#pseudo {
  width: 600px; margin: 25px auto 0; background: rgba(255,255,255,0.05);
  padding: 20px 24px; border-radius: 18px; text-align: left; font-size: 16px;
  backdrop-filter: blur(18px); box-shadow: 0 15px 40px rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.08); border-left: 4px solid #6366f1;
  line-height: 2.2; color: #cbd5e1;
}
#pseudo p { margin: 2px 0; padding: 3px 8px; border-radius: 6px; }
.active { background: linear-gradient(135deg,#6366f1,#06b6d4); color: white !important; padding: 4px 10px; border-radius: 8px; }
.status-text { font-size: 22px; font-weight: 600; color: #f1f5f9; margin: 8px 0 4px; min-height: 28px; }
.rule-text { font-size: 18px; font-weight: 600; color: #22d3ee; min-height: 24px; }
.back { margin-top: 28px; }
</style>
</head>
<body>
<div class="container">
  <h1>Red-Black Tree</h1>
  <div class="controls">
    <input type="text" id="numbers" placeholder="e.g. 10,20,30,15">
    <button onclick="start()">▶ Start</button>
    <br><br>
    <label>Speed <input type="range" id="speed" min="200" max="1500" value="700"></label>
  </div>

  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:linear-gradient(135deg,#6366f1,#06b6d4);"></div> Black node
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:linear-gradient(135deg,#ef4444,#f97316);"></div> Red node
    </div>
  </div>

  <div class="status-text" id="status"></div>
  <div class="rule-text" id="rule"></div>

  <canvas id="canvas" width="1000" height="480"></canvas>

  <div id="pseudo">
    <p id="p1">1. Insert node as RED</p>
    <p id="p2">2. If parent is BLACK → done</p>
    <p id="p3">3. If parent is RED → violation!</p>
    <p id="p4">4. Check uncle's color</p>
    <p id="p5">5. Recolor / Rotate to fix</p>
  </div>

  <div class="back">
    <a href="/level4"><button>⬅ Back</button></a>
  </div>
</div>

<script>
class RBNode {
  constructor(val){ this.val=val; this.color="RED"; this.left=null; this.right=null; this.parent=null; }
}
let root=null;
let ctx=document.getElementById("canvas").getContext("2d");
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function speed(){return 1800-parseInt(document.getElementById("speed").value);}
function highlight(id){
  document.querySelectorAll("#pseudo p").forEach(p=>p.classList.remove("active"));
  const el=document.getElementById(id); if(el) el.classList.add("active");
}

function leftRotate(x){
  let y=x.right; x.right=y.left;
  if(y.left) y.left.parent=x; y.parent=x.parent;
  if(!x.parent) root=y;
  else if(x===x.parent.left) x.parent.left=y;
  else x.parent.right=y;
  y.left=x; x.parent=y;
}
function rightRotate(y){
  let x=y.left; y.left=x.right;
  if(x.right) x.right.parent=y; x.parent=y.parent;
  if(!y.parent) root=x;
  else if(y===y.parent.left) y.parent.left=x;
  else y.parent.right=x;
  x.right=y; y.parent=x;
}

async function fixInsert(z){
  while(z.parent&&z.parent.color==="RED"){
    highlight("p3"); await sleep(speed());
    let parent=z.parent, grand=parent.parent;
    if(parent===grand.left){
      let uncle=grand.right; highlight("p4"); await sleep(speed());
      if(uncle&&uncle.color==="RED"){
        document.getElementById("rule").innerText="Recoloring";
        parent.color="BLACK"; uncle.color="BLACK"; grand.color="RED"; z=grand;
      } else {
        if(z===parent.right){ document.getElementById("rule").innerText="LR Rotation"; z=parent; leftRotate(z); }
        document.getElementById("rule").innerText="LL Rotation";
        z.parent.color="BLACK"; grand.color="RED"; rightRotate(grand);
      }
    } else {
      let uncle=grand.left; highlight("p4"); await sleep(speed());
      if(uncle&&uncle.color==="RED"){
        document.getElementById("rule").innerText="Recoloring";
        parent.color="BLACK"; uncle.color="BLACK"; grand.color="RED"; z=grand;
      } else {
        if(z===parent.left){ document.getElementById("rule").innerText="RL Rotation"; z=parent; rightRotate(z); }
        document.getElementById("rule").innerText="RR Rotation";
        z.parent.color="BLACK"; grand.color="RED"; leftRotate(grand);
      }
    }
    drawTree(); await sleep(speed());
  }
  root.color="BLACK";
}

async function insert(val){
  highlight("p1"); await sleep(speed());
  let node=new RBNode(val), y=null, x=root;
  while(x){ y=x; if(val<x.val) x=x.left; else x=x.right; }
  node.parent=y;
  if(!y) root=node;
  else if(val<y.val) y.left=node;
  else y.right=node;
  drawTree(); await sleep(speed());
  highlight("p2");
  if(!node.parent){ node.color="BLACK"; return; }
  if(node.parent.color==="BLACK") return;
  await fixInsert(node);
}

async function start(){
  root=null; ctx.clearRect(0,0,1000,480);
  let arr=document.getElementById("numbers").value.split(",");
  for(let v of arr){
    let num=parseInt(v); if(isNaN(num)) continue;
    document.getElementById("status").innerText="Inserting "+num;
    await insert(num); drawTree(); await sleep(speed());
  }
  highlight("p5");
  document.getElementById("status").innerText="✅ Done";
}

function drawTree(){ ctx.clearRect(0,0,1000,480); draw(root,500,55,240); }

function draw(node,x,y,offset){
  if(!node) return;
  let g=ctx.createLinearGradient(x-25,y-25,x+25,y+25);
  if(node.color==="RED"){ g.addColorStop(0,"#ef4444"); g.addColorStop(1,"#f97316"); }
  else { g.addColorStop(0,"#6366f1"); g.addColorStop(1,"#06b6d4"); }
  ctx.beginPath(); ctx.arc(x,y,28,0,Math.PI*2);
  ctx.fillStyle=g; ctx.fill();
  ctx.strokeStyle=node.color==="RED"?"#fca5a5":"#c7d2fe"; ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle="#fff"; ctx.font="bold 18px Poppins";
  ctx.textAlign="center"; ctx.fillText(node.val,x,y+7);
  if(node.left){
    ctx.beginPath(); ctx.moveTo(x,y+28); ctx.lineTo(x-offset,y+62);
    ctx.strokeStyle="#64748b"; ctx.lineWidth=2; ctx.stroke();
    draw(node.left,x-offset,y+90,offset/2);
  }
  if(node.right){
    ctx.beginPath(); ctx.moveTo(x,y+28); ctx.lineTo(x+offset,y+62);
    ctx.strokeStyle="#64748b"; ctx.lineWidth=2; ctx.stroke();
    draw(node.right,x+offset,y+90,offset/2);
  }
}
</script>
</body>
</html>
