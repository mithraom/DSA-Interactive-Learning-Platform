<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Searching Visualizer</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  font-family: 'Poppins', 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b, #020617);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  color: #e2e8f0;
}
.container {
  background: rgba(255,255,255,0.05);
  padding: 40px;
  border-radius: 24px;
  box-shadow: 0 25px 70px rgba(0,0,0,0.7), inset 0 0 30px rgba(255,255,255,0.05);
  text-align: center;
  width: 95%;
  max-width: 1100px;
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.08);
}
h1 {
  font-size: 42px;
  font-weight: 600;
  margin-bottom: 15px;
  color: #e0e7ff;
  text-shadow: 0 4px 20px rgba(99,102,241,0.4);
}
.controls {
  margin-bottom: 20px;
}
.controls label {
  font-size: 17px;
  font-weight: 500;
  color: #cbd5e1;
}
input, select {
  padding: 13px 15px;
  margin: 6px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.08);
  color: #e2e8f0;
  font-size: 16px;
  outline: none;
}
input::placeholder { color: #94a3b8; }
button {
  padding: 13px 26px;
  margin: 6px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, #6366f1, #06b6d4);
  color: white;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  font-weight: 600;
  font-size: 16px;
}
button:hover {
  transform: translateY(-4px) scale(1.05);
  box-shadow: 0 20px 50px rgba(0,0,0,0.6);
}
button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}
#array-container {
  display: flex;
  justify-content: center;
  align-items: flex-end;
  margin-top: 30px;
  gap: 8px;
  min-height: 320px;
}
.bar {
  width: 40px;
  background: #38bdf8;
  color: #000;
  border-radius: 8px;
  display: flex;
  justify-content: center;
  align-items: flex-end;
  font-weight: 700;
  font-size: 15px;
  padding-bottom: 4px;
  transition: background 0.15s;
}
.info {
  margin-top: 22px;
  font-size: 19px;
  font-weight: 500;
  color: #cbd5f5;
}
.info span {
  font-size: 21px;
  font-weight: 700;
  color: #a5b4fc;
}
#stepText {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 6px;
  color: #e0e7ff;
}
#pseudocode {
  width: 340px;
  margin: 25px auto;
  background: rgba(255,255,255,0.05);
  padding: 18px 20px;
  border-radius: 12px;
  text-align: left;
  border-left: 4px solid #6366f1;
  font-size: 15px;
  line-height: 2;
}
#pseudocode div { border-radius: 6px; padding: 2px 8px; }
.active {
  background: #6366f1;
  color: white;
  padding: 2px 8px;
  border-radius: 6px;
}
.legend {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 16px;
  flex-wrap: wrap;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 15px;
  font-weight: 500;
}
.legend-color {
  width: 18px;
  height: 18px;
  border-radius: 4px;
}
.back { margin-top: 25px; }
select { background: rgba(255,255,255,0.08); color: #e2e8f0; }
select option { background: #1e293b; color: #e2e8f0; }
@media(max-width:700px) {
  h1 { font-size: 28px; }
  .bar { width: 25px; font-size: 12px; }
}
</style>
</head>
<body>
<div class="container">
  <h1>Searching Visualizer</h1>

  <div class="controls">
    <input id="arrayInput" placeholder="e.g. 5,3,8,2,1,9,4" style="width:220px;">
    <input id="target" placeholder="Target value" style="width:140px;">

    <select id="algorithm">
      <option value="linear">Linear Search</option>
      <option value="binary">Binary Search</option>
    </select>

    <label>Speed <input type="range" id="speed" min="50" max="900" value="500" style="width:120px;vertical-align:middle;"></label>

    <button id="startBtn" onclick="startSearch()">▶ Start</button>
    <button onclick="generateRandom()">🎲 Random</button>
    <button onclick="resetAll()">⟳ Reset</button>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-color" style="background:#38bdf8;"></div> Unsearched</div>
    <div class="legend-item"><div class="legend-color" style="background:#f87171;"></div> Comparing</div>
    <div class="legend-item"><div class="legend-color" style="background:#a78bfa;"></div> Mid / Range</div>
    <div class="legend-item"><div class="legend-color" style="background:#34d399;"></div> Found</div>
    <div class="legend-item"><div class="legend-color" style="background:#475569;"></div> Eliminated</div>
  </div>

  <div id="array-container"></div>

  <div class="info">
    <div id="stepText">Step: Waiting to start</div>
    Comparisons: <span id="comparisons">0</span>
  </div>

  <div id="pseudocode"></div>

  <div class="back">
    <a href="/"><button>⬅ Back to Home</button></a>
  </div>
</div>

<script>
let comparisons = 0, isSorting = false;

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function getSpeed() { return 1010 - parseInt(document.getElementById("speed").value); }
function setStep(msg) { document.getElementById("stepText").innerText = "Step: " + msg; }
function incComparisons() { document.getElementById("comparisons").innerText = ++comparisons; }

function drawArray(arr, comparing = [], found = -1, eliminated = [], mid = -1) {
  const container = document.getElementById("array-container");
  container.innerHTML = "";
  const max = Math.max(...arr, 1);
  arr.forEach((value, index) => {
    const bar = document.createElement("div");
    bar.classList.add("bar");
    bar.style.height = (value / max * 290 + 30) + "px";
    if (index === found)               bar.style.background = "#34d399";
    else if (index === mid)            bar.style.background = "#a78bfa";
    else if (comparing.includes(index)) bar.style.background = "#f87171";
    else if (eliminated.includes(index)) bar.style.background = "#475569";
    bar.innerText = value;
    container.appendChild(bar);
  });
}

function updatePseudocode(algo) {
  const codes = {
    linear: `<div id="l1">for i = 0 to n-1</div>
<div id="l2">&nbsp;&nbsp;if arr[i] == target</div>
<div id="l3">&nbsp;&nbsp;&nbsp;&nbsp;return i (found!)</div>
<div id="l4">return -1 (not found)</div>`,

    binary: `<div id="l1">low = 0, high = n-1</div>
<div id="l2">mid = (low + high) / 2</div>
<div id="l3">&nbsp;&nbsp;if arr[mid] == target</div>
<div id="l4">&nbsp;&nbsp;if arr[mid] &lt; target: low = mid+1</div>
<div id="l5">&nbsp;&nbsp;else: high = mid-1</div>`
  };
  document.getElementById("pseudocode").innerHTML = codes[algo] || "";
}

function highlight(id) {
  document.querySelectorAll("#pseudocode div").forEach(d => d.classList.remove("active"));
  const el = document.getElementById(id);
  if (el) el.classList.add("active");
}

/* ===== LINEAR SEARCH ===== */
async function linearSearch(arr, target) {
  for (let i = 0; i < arr.length; i++) {
    highlight("l2");
    incComparisons();
    setStep(`Checking arr[${i}] = ${arr[i]}`);
    drawArray(arr, [i]);
    await sleep(getSpeed());

    if (arr[i] === target) {
      highlight("l3");
      setStep(`✅ Found ${target} at index ${i}!`);
      drawArray(arr, [], i);
      return;
    }
  }
  highlight("l4");
  setStep(`❌ ${target} not found in array`);
  drawArray(arr, [], -1, [...Array(arr.length).keys()]);
}

/* ===== BINARY SEARCH ===== */
async function binarySearch(arr, target) {
  arr.sort((a, b) => a - b);
  setStep("Array sorted for Binary Search");
  drawArray(arr);
  await sleep(getSpeed());

  let low = 0, high = arr.length - 1;
  const eliminated = [];

  while (low <= high) {
    const mid = Math.floor((low + high) / 2);
    highlight("l2");
    setStep(`low=${low}, high=${high}, mid=${mid} → arr[mid]=${arr[mid]}`);
    drawArray(arr, [], -1, eliminated, mid);
    await sleep(getSpeed());

    incComparisons();
    highlight("l3");
    setStep(`Comparing arr[${mid}]=${arr[mid]} with target=${target}`);
    drawArray(arr, [mid], -1, eliminated, -1);
    await sleep(getSpeed());

    if (arr[mid] === target) {
      setStep(`✅ Found ${target} at index ${mid}!`);
      drawArray(arr, [], mid, eliminated);
      return;
    }

    if (arr[mid] < target) {
      highlight("l4");
      for (let i = low; i <= mid; i++) eliminated.push(i);
      setStep(`${arr[mid]} < ${target} → search right half`);
      low = mid + 1;
    } else {
      highlight("l5");
      for (let i = mid; i <= high; i++) eliminated.push(i);
      setStep(`${arr[mid]} > ${target} → search left half`);
      high = mid - 1;
    }
    drawArray(arr, [], -1, eliminated);
    await sleep(getSpeed());
  }
  setStep(`❌ ${target} not found in array`);
  drawArray(arr, [], -1, [...Array(arr.length).keys()]);
}

/* ===== GENERATE RANDOM ===== */
function generateRandom() {
  const size = Math.floor(Math.random() * 6) + 5;
  const nums = Array.from({ length: size }, () => Math.floor(Math.random() * 95) + 5);
  document.getElementById("arrayInput").value = nums.join(",");
  document.getElementById("target").value = nums[Math.floor(Math.random() * nums.length)];
  resetAll();
  drawArray(nums);
}

/* ===== RESET ===== */
function resetAll() {
  comparisons = 0;
  document.getElementById("comparisons").innerText = "0";
  document.getElementById("stepText").innerText = "Step: Waiting to start";
  document.getElementById("pseudocode").innerHTML = "";
  document.getElementById("array-container").innerHTML = "";
  isSorting = false;
  document.getElementById("startBtn").disabled = false;
}

/* ===== START ===== */
async function startSearch() {
  if (isSorting) return;

  const raw = document.getElementById("arrayInput").value;
  const arr = raw.split(",").map(x => parseInt(x.trim())).filter(x => !isNaN(x) && x > 0);
  const target = parseInt(document.getElementById("target").value);

  if (arr.length < 2) {
    alert("Please enter at least 2 valid positive numbers!");
    return;
  }
  if (arr.length > 15) {
    alert("Please enter at most 15 numbers for best visualization!");
    return;
  }
  if (isNaN(target)) {
    alert("Please enter a valid target value!");
    return;
  }

  isSorting = true;
  comparisons = 0;
  document.getElementById("comparisons").innerText = "0";
  document.getElementById("startBtn").disabled = true;

  const algo = document.getElementById("algorithm").value;
  updatePseudocode(algo);
  drawArray(arr);
  setStep("Starting...");
  await sleep(400);

  if (algo === "linear") await linearSearch(arr, target);
  if (algo === "binary") await binarySearch(arr, target);

  highlight("");
  isSorting = false;
  document.getElementById("startBtn").disabled = false;
}
</script>
</body>
</html>
