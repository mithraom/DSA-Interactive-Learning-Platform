<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hash Table Visualization</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  font-family: 'Poppins', 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b, #020617);
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  color: #e2e8f0;
  padding: 30px 0;
}
.container {
  background: rgba(255,255,255,0.05);
  padding: 40px;
  border-radius: 24px;
  box-shadow: 0 25px 70px rgba(0,0,0,0.7), inset 0 0 30px rgba(255,255,255,0.05);
  text-align: center;
  width: 95%;
  max-width: 1100px;
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.08);
}
h1 {
  font-size: 42px;
  font-weight: 600;
  margin-bottom: 20px;
  color: #e0e7ff;
  text-shadow: 0 4px 20px rgba(99,102,241,0.4);
}
input[type="number"] {
  padding: 13px 15px;
  margin: 6px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.08);
  color: #e2e8f0;
  font-size: 16px;
  outline: none;
  width: 200px;
  transition: 0.3s;
  font-family: 'Poppins', sans-serif;
}
input[type="number"]:focus { border-color: #6366f1; box-shadow: 0 0 15px rgba(99,102,241,0.5); }
input[type="number"]::placeholder { color: #94a3b8; }
input[type="range"] { width: 160px; vertical-align: middle; }
button {
  padding: 13px 26px;
  margin: 6px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, #6366f1, #06b6d4);
  color: white;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  font-weight: 600;
  font-size: 16px;
  font-family: 'Poppins', sans-serif;
}
button:hover { transform: translateY(-4px) scale(1.05); box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
.controls { margin-bottom: 20px; }
.controls label { font-size: 16px; color: #cbd5e1; }
.status-text {
  font-size: 22px;
  font-weight: 600;
  color: #22d3ee;
  margin: 15px 0;
  min-height: 32px;
}
#table { margin: 20px auto; width: fit-content; }
.bucket {
  display: flex;
  align-items: center;
  margin: 8px auto;
  width: 560px;
  padding: 12px 16px;
  background: rgba(255,255,255,0.05);
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  flex-wrap: wrap;
  gap: 8px;
}
.bucket.active-bucket {
  border-color: #6366f1;
  box-shadow: 0 0 18px rgba(99,102,241,0.4);
}
.idx {
  font-weight: 700;
  color: #22d3ee;
  font-size: 18px;
  margin-right: 10px;
  min-width: 30px;
}
.chain-arrow {
  color: #64748b;
  font-size: 18px;
  margin: 0 2px;
}
.box {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 8px 16px;
  background: linear-gradient(135deg, #6366f1, #06b6d4);
  color: white;
  border-radius: 10px;
  font-weight: 600;
  font-size: 16px;
  box-shadow: 0 6px 16px rgba(0,0,0,0.35);
  animation: popIn 0.25s ease;
}
@keyframes popIn { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
#pseudo {
  width: 600px;
  margin: 25px auto 0;
  background: rgba(255,255,255,0.05);
  padding: 20px 24px;
  border-radius: 18px;
  text-align: left;
  font-size: 16px;
  backdrop-filter: blur(18px);
  box-shadow: 0 15px 40px rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.08);
  border-left: 4px solid #6366f1;
  line-height: 2.2;
  color: #cbd5e1;
}
#pseudo p { margin: 2px 0; padding: 3px 8px; border-radius: 6px; }
.active { background: linear-gradient(135deg,#6366f1,#06b6d4); color: white !important; padding: 4px 10px; border-radius: 8px; }
.back { margin-top: 28px; }
</style>
</head>
<body>
<div class="container">
  <h1>Hash Table — Chaining</h1>

  <div class="controls">
    <input type="number" id="value" placeholder="Enter number">
    <button onclick="insert()">➕ Insert</button>
    <button onclick="resetTable()">⟳ Reset</button>
    <br><br>
    <label>Speed <input type="range" id="speed" min="200" max="1500" value="700"></label>
  </div>

  <div class="status-text" id="status"></div>
  <div id="table"></div>

  <div id="pseudo">
    <p id="p1">1. Compute index = key % table_size</p>
    <p id="p2">2. Go to that bucket</p>
    <p id="p3">3. If empty → insert directly</p>
    <p id="p4">4. If collision → chain at end</p>
  </div>

  <div class="back">
    <a href="/"><button>⬅ Back to Home</button></a>
  </div>
</div>

<script>
const SIZE = 7;
let table = Array.from({length: SIZE}, () => []);
let activeBucket = -1;

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function getSpeed() { return 1600 - parseInt(document.getElementById("speed").value); }

function highlight(id) {
  document.querySelectorAll("#pseudo p").forEach(p => p.classList.remove("active"));
  const el = document.getElementById(id);
  if (el) el.classList.add("active");
}

function render() {
  let container = document.getElementById("table");
  container.innerHTML = "";
  for (let i=0; i<SIZE; i++) {
    let row = document.createElement("div");
    row.className = "bucket" + (i === activeBucket ? " active-bucket" : "");
    let idx = document.createElement("span");
    idx.className = "idx"; idx.innerText = i + " :";
    row.appendChild(idx);
    for (let j=0; j<table[i].length; j++) {
      if (j > 0) {
        let arr = document.createElement("span");
        arr.className = "chain-arrow"; arr.innerText = "→";
        row.appendChild(arr);
      }
      let box = document.createElement("span");
      box.className = "box"; box.innerText = table[i][j];
      row.appendChild(box);
    }
    container.appendChild(row);
  }
}

async function insert() {
  let raw = document.getElementById("value").value;
  if (raw === "") return;
  let value = parseInt(raw);

  highlight("p1");
  await sleep(getSpeed());
  let index = value % SIZE;
  document.getElementById("status").innerText = `Hash Index = ${value} % ${SIZE} = ${index}`;
  activeBucket = index; render();

  highlight("p2");
  await sleep(getSpeed());

  if (table[index].length === 0) {
    highlight("p3");
  } else {
    highlight("p4");
  }
  table[index].push(value);
  render();
  await sleep(getSpeed());
  activeBucket = -1;
  document.getElementById("value").value = "";
}

function resetTable() {
  table = Array.from({length: SIZE}, () => []);
  activeBucket = -1;
  document.getElementById("status").innerText = "";
  document.querySelectorAll("#pseudo p").forEach(p => p.classList.remove("active"));
  render();
}

render();
</script>
</body>
</html>
