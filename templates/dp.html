<!DOCTYPE html>
<html>
<head>
<title>Dynamic Programming - Multistage Graph</title>

<link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap)" rel="stylesheet">

<style>
body{
font-family:'Poppins',sans-serif;
text-align:center;
background:#0f172a;
color:white;
font-size:18px;
}

h2{
font-size:32px;
}

h3{
font-size:24px;
}

textarea{
width:400px;
height:150px;
padding:12px;
border-radius:10px;
background:#111;
color:white;
font-size:16px;
font-family:'Poppins',sans-serif;
}

button{
padding:12px 24px;
margin:5px;
border:none;
border-radius:10px;
background:#6366f1;
color:white;
cursor:pointer;
font-size:16px;
font-family:'Poppins',sans-serif;
}

button:hover{
background:#4f46e5;
}

.box{
display:inline-block;
padding:18px;
margin:10px;
background:#6366f1;
border-radius:10px;
min-width:140px;
font-size:18px;
}

.active{
background:#22c55e;
padding:6px 10px;
border-radius:5px;
}

#steps p{
font-size:18px;
margin:8px 0;
}

label{
font-size:18px;
}

/* Graph Visualization Styles */
#graphContainer{
margin:30px auto;
position:relative;
width:800px;
height:400px;
background:#1e293b;
border-radius:15px;
border:2px solid #334155;
}

.graph-node{
position:absolute;
width:60px;
height:60px;
border-radius:50%;
background:#6366f1;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:600;
transition:all 0.3s ease;
z-index:10;
border:3px solid #818cf8;
}

.graph-node.current{
background:#f59e0b;
border-color:#fbbf24;
transform:scale(1.2);
box-shadow:0 0 20px #f59e0b;
}

.graph-node.checking{
background:#ec4899;
border-color:#f472b6;
box-shadow:0 0 15px #ec4899;
}

.graph-node.done{
background:#22c55e;
border-color:#4ade80;
}

.graph-node .node-cost{
position:absolute;
bottom:-28px;
font-size:14px;
color:#94a3b8;
white-space:nowrap;
}

#edgeCanvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

#graphTitle{
font-size:20px;
color:#94a3b8;
margin-bottom:10px;
}

#currentEdge{
font-size:20px;
color:#f59e0b;
margin:15px 0;
min-height:30px;
}
</style>
</head>

<body>

<h2>DP - Multistage Graph</h2>

<textarea id="matrix">
0,2,1,0,0
0,0,0,3,0
0,0,0,1,4
0,0,0,0,2
0,0,0,0,0
</textarea>

<br><br>

<button onclick="startDP()">Start</button>
<button onclick="resetDP()">Reset</button>

<br><br>

<label>Speed:</label>
<input type="range" id="speed" min="200" max="1500" value="700">

<h3 id="status"></h3>

<p id="currentEdge"></p>

<div id="graphTitle">Graph Visualization</div>
<div id="graphContainer">
<canvas id="edgeCanvas"></canvas>
</div>

<div id="dpTable"></div>

<div id="steps">
<p id="p1">1. cost[n-1] = 0</p>
<p id="p2">2. Loop i from n-2 → 0</p>
<p id="p3">3. Try all edges (i → j)</p>
<p id="p4">4. cost[i] = min(weight + cost[j])</p>
<p id="p5">5. Build path</p>
</div>

<br>

<a href="/"><button>⬅ Back to home</button></a>

<script>

let graph=[]
let n
let cost=[]
let nextNode=[]
let nodeElements=[]

function sleep(ms){
return new Promise(r=>setTimeout(r,ms))
}

function getSpeed(){
return 1600 - parseInt(document.getElementById("speed").value)
}

function highlight(id){
document.querySelectorAll("#steps p").forEach(p=>p.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

/* SAFE PARSE */
function parse(){
let rows = document.getElementById("matrix").value.trim().split("\n")
graph = []

for(let r of rows){
let nums = r.split(",").map(x=>parseInt(x.trim()))
if(nums.some(isNaN)){
alert("Invalid matrix input")
return false
}
graph.push(nums)
}

n = graph.length
return true
}

/* DRAW GRAPH */
function drawGraph(){
let container = document.getElementById("graphContainer")
let canvas = document.getElementById("edgeCanvas")
let ctx = canvas.getContext("2d")

// Clear previous
container.querySelectorAll(".graph-node").forEach(el=>el.remove())
nodeElements = []

// Set canvas size
canvas.width = container.offsetWidth
canvas.height = container.offsetHeight

// Calculate node positions (arrange in stages/layers)
let positions = []
let centerY = canvas.height / 2
let padding = 80
let stageWidth = (canvas.width - padding * 2) / (n - 1)

for(let i = 0; i < n; i++){
positions.push({
x: padding + i * stageWidth,
y: centerY + (i % 2 === 0 ? -30 : 30) * (n > 3 ? 1 : 0)
})
}

// Adjust for better visibility with more nodes
if(n >= 4){
let rows = Math.ceil(Math.sqrt(n))
for(let i = 0; i < n; i++){
let col = Math.floor(i / rows)
let row = i % rows
let totalCols = Math.ceil(n / rows)
positions[i] = {
x: padding + col * ((canvas.width - padding * 2) / Math.max(totalCols - 1, 1)),
y: 60 + row * ((canvas.height - 120) / Math.max(rows - 1, 1))
}
}
}

// Draw edges first
ctx.clearRect(0, 0, canvas.width, canvas.height)

for(let i = 0; i < n; i++){
for(let j = 0; j < n; j++){
if(graph[i][j] > 0){
drawEdge(ctx, positions[i], positions[j], graph[i][j], "#475569")
}
}
}

// Create node elements
for(let i = 0; i < n; i++){
let node = document.createElement("div")
node.className = "graph-node"
node.id = "node-" + i
node.innerHTML = i + `<span class="node-cost">∞</span>`
node.style.left = (positions[i].x - 30) + "px"
node.style.top = (positions[i].y - 30) + "px"
container.appendChild(node)
nodeElements.push({element: node, pos: positions[i]})
}
}

function drawEdge(ctx, from, to, weight, color){
let dx = to.x - from.x
let dy = to.y - from.y
let len = Math.sqrt(dx*dx + dy*dy)

// Offset to start/end at node edge
let offsetX = (dx / len) * 30
let offsetY = (dy / len) * 30

let startX = from.x + offsetX
let startY = from.y + offsetY
let endX = to.x - offsetX
let endY = to.y - offsetY

// Draw line
ctx.beginPath()
ctx.moveTo(startX, startY)
ctx.lineTo(endX, endY)
ctx.strokeStyle = color
ctx.lineWidth = 2
ctx.stroke()

// Draw arrow
let angle = Math.atan2(endY - startY, endX - startX)
let arrowLen = 12
ctx.beginPath()
ctx.moveTo(endX, endY)
ctx.lineTo(endX - arrowLen * Math.cos(angle - Math.PI/6), endY - arrowLen * Math.sin(angle - Math.PI/6))
ctx.moveTo(endX, endY)
ctx.lineTo(endX - arrowLen * Math.cos(angle + Math.PI/6), endY - arrowLen * Math.sin(angle + Math.PI/6))
ctx.strokeStyle = color
ctx.lineWidth = 2
ctx.stroke()

// Draw weight
let midX = (startX + endX) / 2
let midY = (startY + endY) / 2
ctx.fillStyle = "#fbbf24"
ctx.font = "bold 16px Poppins"
ctx.fillText(weight, midX + 5, midY - 5)
}

function highlightEdge(fromIdx, toIdx, color){
let canvas = document.getElementById("edgeCanvas")
let ctx = canvas.getContext("2d")

// Redraw all edges
ctx.clearRect(0, 0, canvas.width, canvas.height)

for(let i = 0; i < n; i++){
for(let j = 0; j < n; j++){
if(graph[i][j] > 0){
let edgeColor = "#475569"
if(i === fromIdx && j === toIdx){
edgeColor = color
}
drawEdge(ctx, nodeElements[i].pos, nodeElements[j].pos, graph[i][j], edgeColor)
}
}
}
}

function updateNodeDisplay(idx, costVal, state){
let node = document.getElementById("node-" + idx)
if(!node) return

node.className = "graph-node"
if(state) node.classList.add(state)

let costText = costVal === Infinity ? "∞" : costVal
node.innerHTML = idx + `<span class="node-cost">${costText}</span>`
}

/* RENDER DP TABLE */
function render(){
let div = document.getElementById("dpTable")
div.innerHTML=""

for(let i=0;i<n;i++){
let box = document.createElement("div")
box.className="box"

box.innerHTML = `
Node ${i}<br>
Cost: ${cost[i] === Infinity ? "∞" : cost[i]}<br>
Next: ${nextNode[i]}
`

div.appendChild(box)
}
}

/* MAIN */
async function startDP(){

if(!parse()) return

cost = Array(n).fill(Infinity)
nextNode = Array(n).fill("-")

// Draw the graph
drawGraph()

await sleep(getSpeed())

highlight("p1")

cost[n-1] = 0
updateNodeDisplay(n-1, 0, "done")
render()

document.getElementById("currentEdge").innerText = `Initializing: cost[${n-1}] = 0`

await sleep(getSpeed())

for(let i=n-2;i>=0;i--){

highlight("p2")
document.getElementById("currentEdge").innerText = `Processing node ${i}`

// Mark current node
for(let k = 0; k < n; k++){
if(k !== n-1 && cost[k] !== Infinity){
updateNodeDisplay(k, cost[k], "done")
} else if(k === n-1){
updateNodeDisplay(k, cost[k], "done")
} else {
updateNodeDisplay(k, cost[k], "")
}
}
updateNodeDisplay(i, cost[i], "current")

await sleep(getSpeed())

for(let j=0;j<n;j++){

if(graph[i][j] > 0){

highlight("p3")

// Highlight the edge being checked
highlightEdge(i, j, "#ec4899")
updateNodeDisplay(j, cost[j], "checking")

if(cost[j] === Infinity){
document.getElementById("currentEdge").innerText =
`Edge ${i} → ${j}: weight=${graph[i][j]}, but cost[${j}]=∞ (skip)`
await sleep(getSpeed())
updateNodeDisplay(j, cost[j], cost[j] !== Infinity ? "done" : "")
continue
}

let newCost = graph[i][j] + cost[j]

document.getElementById("status").innerText =
`Checking node ${i} → ${j} : ${graph[i][j]} + ${cost[j]} = ${newCost}`

document.getElementById("currentEdge").innerText =
`Edge ${i} → ${j}: ${graph[i][j]} + ${cost[j]} = ${newCost} ${newCost < cost[i] ? '< ' + (cost[i] === Infinity ? '∞' : cost[i]) + ' ✓' : '>= ' + cost[i] + ' ✗'}`

await sleep(getSpeed())

if(newCost < cost[i]){

highlight("p4")

cost[i] = newCost
nextNode[i] = j

updateNodeDisplay(i, cost[i], "current")
render()

await sleep(getSpeed())
}

// Reset checked node appearance
if(j !== i){
updateNodeDisplay(j, cost[j], "done")
}
}
}

// Mark node as done
updateNodeDisplay(i, cost[i], "done")
highlightEdge(-1, -1, "") // Clear edge highlight
}

/* BUILD PATH */
highlight("p5")

let path = [0]
let current = 0

while(nextNode[current] !== "-" && nextNode[current] !== undefined){
path.push(nextNode[current])
current = nextNode[current]
}

// Highlight the final path on the graph
highlightFinalPath(path)

document.getElementById("status").innerText =
`Shortest Path: ${path.join(" → ")} | Cost: ${cost[0]}`

document.getElementById("currentEdge").innerText = `Final path found!`
}

function highlightFinalPath(path){
let canvas = document.getElementById("edgeCanvas")
let ctx = canvas.getContext("2d")

// Redraw all edges with path highlighted
ctx.clearRect(0, 0, canvas.width, canvas.height)

for(let i = 0; i < n; i++){
for(let j = 0; j < n; j++){
if(graph[i][j] > 0){
let edgeColor = "#475569"

// Check if this edge is in the path
for(let p = 0; p < path.length - 1; p++){
if(path[p] === i && path[p+1] === j){
edgeColor = "#22c55e"
break
}
}

drawEdge(ctx, nodeElements[i].pos, nodeElements[j].pos, graph[i][j], edgeColor)
}
}
}

// Highlight path nodes
for(let i = 0; i < n; i++){
let isInPath = path.includes(i)
updateNodeDisplay(i, cost[i], isInPath ? "done" : "")
}
}

/* RESET */
function resetDP(){
document.getElementById("dpTable").innerHTML=""
document.getElementById("status").innerText=""
document.getElementById("currentEdge").innerText=""
document.querySelectorAll("#steps p").forEach(p=>p.classList.remove("active"))

let container = document.getElementById("graphContainer")
container.querySelectorAll(".graph-node").forEach(el=>el.remove())

let canvas = document.getElementById("edgeCanvas")
let ctx = canvas.getContext("2d")
ctx.clearRect(0, 0, canvas.width, canvas.height)

nodeElements = []
}

</script>

</body>
</html>
