<!DOCTYPE html>
<html>
<head>

<title>Tree Visualizations</title>

<!-- SAME FONT SYSTEM -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* ===== GLOBAL DESIGN SYSTEM ===== */

body{
font-family:'Poppins','Segoe UI',sans-serif;
text-align:center;
background: linear-gradient(135deg, #0f172a, #1e293b, #020617);
color:#e2e8f0;
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* ===== CONTAINER ===== */

.container{
background:rgba(255,255,255,0.05);
padding:60px;
border-radius:24px;
box-shadow:
0 25px 70px rgba(0,0,0,0.7),
inset 0 0 30px rgba(255,255,255,0.05);
text-align:center;
width:90%;
max-width:900px;
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.08);
}

/* ===== HEADING ===== */

h1{
font-size:42px;
font-weight:600;
color:#e0e7ff;
margin-bottom:40px;
letter-spacing:1px;
text-shadow:0 4px 20px rgba(99,102,241,0.4);
}

/* ===== GRID ===== */

.grid{
display:grid;
grid-template-columns: repeat(2, 1fr);
gap:20px;
}

/* ===== LINKS ===== */

a{
text-decoration:none;
}

/* ===== BUTTON CARDS ===== */

button{
padding:20px;
font-size:18px;
font-weight:500;
border:none;
border-radius:16px;
background:linear-gradient(135deg,#6366f1,#06b6d4);
color:white;
cursor:pointer;
transition:0.35s;
box-shadow:0 15px 40px rgba(0,0,0,0.5);
letter-spacing:0.5px;
}

/* Hover effect */
button:hover{
transform:translateY(-6px) scale(1.05);
box-shadow:0 25px 60px rgba(0,0,0,0.7);
}

/* Back button */
.back{
margin-top:30px;
}

/* ===== RESPONSIVE ===== */

@media(max-width:700px){
.grid{
grid-template-columns:1fr;
}
h1{
font-size:32px;
}
}

</style>

</head>

<body>

<div class="container">

<h1>Level 4 — Tree Data Structures</h1>

<div class="grid">

<a href="/binary_tree"><button>Binary Tree</button></a>
<a href="/bst"><button>Binary Search Tree</button></a>
<a href="/avl"><button>AVL Tree</button></a>
<a href="/red_black"><button>Red Black Tree</button></a>
<a href="/min_heap"><button>Min Heap</button></a>
<a href="/max_heap"><button>Max Heap</button></a>
<a href="/m_way"><button>M-Way Tree</button></a>
<a href="/b_tree"><button>B Tree</button></a>

</div>

<div class="back">
<a href="/"><button>⬅ Back to home</button></a>
</div>

</div>

</body>
</html>
