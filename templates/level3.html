<!DOCTYPE html>
<html>
<head>
<title>Level 3 - Stack and Queue</title>

<!-- SAME FONT SYSTEM -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* ===== GLOBAL DESIGN SYSTEM ===== */

body{
font-family:'Poppins','Segoe UI',sans-serif;
text-align:center;
background: linear-gradient(135deg, #0f172a, #1e293b, #020617);
color:#e2e8f0;
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* ===== CONTAINER ===== */

.container{
background:rgba(255,255,255,0.05);
padding:60px;
border-radius:24px;
box-shadow:
0 25px 70px rgba(0,0,0,0.7),
inset 0 0 30px rgba(255,255,255,0.05);
text-align:center;
width:90%;
max-width:700px;
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.08);
}

/* ===== HEADINGS ===== */

h1{
font-size:46px;
font-weight:600;
color:#e0e7ff;
margin-bottom:5px;
letter-spacing:1px;
text-shadow:0 4px 20px rgba(99,102,241,0.4);
}

h2{
font-size:26px;
font-weight:500;
color:#c7d2fe;
margin-bottom:40px;
}

/* ===== BUTTON LINKS ===== */

a{
text-decoration:none;
}

/* ===== BUTTONS ===== */

button{
padding:20px 40px;
margin:15px;
font-size:20px;
font-weight:500;
border:none;
border-radius:16px;
background:linear-gradient(135deg,#6366f1,#06b6d4);
color:white;
cursor:pointer;
transition:0.35s;
box-shadow:0 15px 40px rgba(0,0,0,0.5);
letter-spacing:0.5px;
}

/* Hover effect */
button:hover{
transform:translateY(-6px) scale(1.05);
box-shadow:0 25px 60px rgba(0,0,0,0.7);
}

/* Back button spacing */
.back{
margin-top:30px;
}

/* ===== RESPONSIVE ===== */

@media(max-width:600px){
.container{
padding:35px;
}
button{
width:80%;
}
h1{
font-size:34px;
}
}

</style>

</head>

<body>

<div class="container">

<h1>Level 3</h1>
<h2>Stack & Queue Visualization</h2>

<a href="/stack">
<button>Stack Visualization</button>
</a>

<a href="/queue">
<button>Queue Visualization</button>
</a>

<div class="back">
<a href="/">
<button>⬅ Back to Home</button>
</a>
</div>

</div>

</body>
</html>
