<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Min Heap Visualization</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  font-family: 'Poppins', 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b, #020617);
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  color: #e2e8f0;
  padding: 30px 0;
}
.container {
  background: rgba(255,255,255,0.05);
  padding: 40px;
  border-radius: 24px;
  box-shadow: 0 25px 70px rgba(0,0,0,0.7), inset 0 0 30px rgba(255,255,255,0.05);
  text-align: center;
  width: 95%;
  max-width: 1100px;
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.08);
}
h1 { font-size: 42px; font-weight: 600; margin-bottom: 20px; color: #e0e7ff; text-shadow: 0 4px 20px rgba(99,102,241,0.4); }
input[type="text"] {
  padding: 13px 15px; margin: 6px; border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.08);
  color: #e2e8f0; font-size: 16px; outline: none; width: 280px;
  transition: 0.3s; font-family: 'Poppins', sans-serif;
}
input[type="text"]:focus { border-color: #6366f1; box-shadow: 0 0 15px rgba(99,102,241,0.5); }
input[type="text"]::placeholder { color: #94a3b8; }
input[type="range"] { width: 160px; vertical-align: middle; }
button {
  padding: 13px 26px; margin: 6px; border: none; border-radius: 14px;
  background: linear-gradient(135deg, #6366f1, #06b6d4); color: white;
  cursor: pointer; transition: 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  font-weight: 600; font-size: 16px; font-family: 'Poppins', sans-serif;
}
button:hover { transform: translateY(-4px) scale(1.05); box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
.controls { margin-bottom: 20px; }
.controls label { font-size: 16px; color: #cbd5e1; }
canvas {
  margin-top: 20px; background: rgba(255,255,255,0.04); border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.7), inset 0 0 20px rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08); display: block; margin-left: auto; margin-right: auto;
}
#pseudo {
  width: 600px; margin: 25px auto 0; background: rgba(255,255,255,0.05);
  padding: 20px 24px; border-radius: 18px; text-align: left; font-size: 16px;
  backdrop-filter: blur(18px); box-shadow: 0 15px 40px rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.08); border-left: 4px solid #6366f1;
  line-height: 2.2; color: #cbd5e1;
}
#pseudo p { margin: 2px 0; padding: 3px 8px; border-radius: 6px; }
.active { background: linear-gradient(135deg,#6366f1,#06b6d4); color: white !important; padding: 4px 10px; border-radius: 8px; }
.status-text { font-size: 22px; font-weight: 600; color: #22d3ee; margin: 10px 0; min-height: 32px; }
.array-view { font-size: 18px; color: #94a3b8; margin: 6px 0 10px; }
.back { margin-top: 28px; }
</style>
</head>
<body>
<div class="container">
  <h1>Min Heap Visualization</h1>
  <div class="controls">
    <input type="text" id="numbers" placeholder="e.g. 10,20,5,30">
    <button onclick="start()">▶ Start</button>
    <br><br>
    <label>Speed <input type="range" id="speed" min="200" max="1500" value="700"></label>
  </div>
  <div class="status-text" id="status"></div>
  <div class="array-view" id="arrayView"></div>
  <canvas id="canvas" width="1000" height="480"></canvas>
  <div id="pseudo">
    <p id="p1">1. Insert at end of heap</p>
    <p id="p2">2. Compare with parent node</p>
    <p id="p3">3. If smaller → swap up</p>
    <p id="p4">4. Repeat until heap property holds</p>
  </div>
  <div class="back">
    <a href="/level4"><button>⬅ Back</button></a>
  </div>
</div>
<script>
let heap=[];
let ctx=document.getElementById("canvas").getContext("2d");
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function getSpeed(){return 1800-parseInt(document.getElementById("speed").value);}
function highlight(id){
  document.querySelectorAll("#pseudo p").forEach(p=>p.classList.remove("active"));
  const el=document.getElementById(id); if(el) el.classList.add("active");
}
async function insert(val){
  highlight("p1"); heap.push(val); updateArray(); drawTree(); await sleep(getSpeed());
  let i=heap.length-1;
  while(i>0){
    highlight("p2");
    let parent=Math.floor((i-1)/2); await sleep(getSpeed());
    if(heap[i]<heap[parent]){
      highlight("p3");
      [heap[i],heap[parent]]=[heap[parent],heap[i]];
      updateArray(); drawTree(); await sleep(getSpeed());
      i=parent; highlight("p4");
    } else break;
  }
}
async function start(){
  heap=[]; ctx.clearRect(0,0,1000,480);
  document.getElementById("status").innerText="";
  document.getElementById("arrayView").innerText="";
  let arr=document.getElementById("numbers").value.split(",");
  for(let v of arr){
    let num=parseInt(v.trim()); if(isNaN(num)) continue;
    document.getElementById("status").innerText="Inserting "+num; await insert(num);
  }
  document.getElementById("status").innerText="✅ Min Heap built!";
}
function updateArray(){document.getElementById("arrayView").innerText="Heap array: [ "+heap.join(", ")+" ]";}
function drawTree(){ctx.clearRect(0,0,1000,480); drawNode(0,500,50,240);}
function drawNode(i,x,y,offset){
  if(i>=heap.length) return;
  let g=ctx.createLinearGradient(x-25,y-25,x+25,y+25);
  g.addColorStop(0,"#6366f1"); g.addColorStop(1,"#06b6d4");
  ctx.beginPath(); ctx.arc(x,y,28,0,Math.PI*2);
  ctx.fillStyle=g; ctx.fill();
  ctx.strokeStyle="#c7d2fe"; ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle="#fff"; ctx.font="bold 18px Poppins";
  ctx.textAlign="center"; ctx.fillText(heap[i],x,y+7);
  let left=2*i+1, right=2*i+2;
  if(left<heap.length){
    ctx.beginPath(); ctx.moveTo(x,y+28); ctx.lineTo(x-offset,y+62);
    ctx.strokeStyle="#64748b"; ctx.lineWidth=2; ctx.stroke();
    drawNode(left,x-offset,y+90,offset/2);
  }
  if(right<heap.length){
    ctx.beginPath(); ctx.moveTo(x,y+28); ctx.lineTo(x+offset,y+62);
    ctx.strokeStyle="#64748b"; ctx.lineWidth=2; ctx.stroke();
    drawNode(right,x+offset,y+90,offset/2);
  }
}
</script>
</body>
</html>
