<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stack Visualizer</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  font-family: 'Poppins', 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b, #020617);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  color: #e2e8f0;
}
.container {
  background: rgba(255,255,255,0.05);
  padding: 40px;
  border-radius: 24px;
  box-shadow: 0 25px 70px rgba(0,0,0,0.7), inset 0 0 30px rgba(255,255,255,0.05);
  text-align: center;
  width: 95%;
  max-width: 1100px;
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.08);
}
h1 {
  font-size: 42px;
  font-weight: 600;
  margin-bottom: 15px;
  color: #e0e7ff;
  text-shadow: 0 4px 20px rgba(99,102,241,0.4);
}
.controls {
  margin-bottom: 20px;
}
.controls label {
  font-size: 17px;
  font-weight: 500;
  color: #cbd5e1;
}
input, select {
  padding: 13px 15px;
  margin: 6px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.08);
  color: #e2e8f0;
  font-size: 16px;
  outline: none;
}
input::placeholder { color: #94a3b8; }
button {
  padding: 13px 26px;
  margin: 6px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, #6366f1, #06b6d4);
  color: white;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  font-weight: 600;
  font-size: 16px;
}
button:hover {
  transform: translateY(-4px) scale(1.05);
  box-shadow: 0 20px 50px rgba(0,0,0,0.6);
}
button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

/* ===== STACK VISUAL AREA ===== */
#stack-container {
  display: flex;
  justify-content: center;
  align-items: flex-end;
  gap: 0;
  margin-top: 30px;
  min-height: 320px;
}
.stack-column {
  display: flex;
  flex-direction: column-reverse;
  align-items: center;
  gap: 6px;
  position: relative;
}
.stack-base {
  width: 160px;
  height: 6px;
  background: rgba(99,102,241,0.5);
  border-radius: 4px;
  margin-top: 6px;
  box-shadow: 0 0 12px rgba(99,102,241,0.4);
}
.block {
  width: 140px;
  padding: 14px 0;
  border-radius: 10px;
  background: #38bdf8;
  color: #000;
  font-weight: 700;
  font-size: 16px;
  text-align: center;
  transition: background 0.2s, transform 0.2s;
  position: relative;
}
.block.top-block {
  background: #a78bfa;
}
.block.highlight-push {
  background: #34d399;
}
.block.highlight-pop {
  background: #f87171;
}
.top-label {
  position: absolute;
  right: -60px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 13px;
  font-weight: 600;
  color: #a78bfa;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 6px;
}
.top-label::before {
  content: '';
  display: inline-block;
  width: 30px;
  height: 2px;
  background: #a78bfa;
  border-radius: 2px;
}

/* ===== LEGEND ===== */
.legend {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 16px;
  flex-wrap: wrap;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 15px;
  font-weight: 500;
}
.legend-color {
  width: 18px;
  height: 18px;
  border-radius: 4px;
}

/* ===== INFO / STEP ===== */
.info {
  margin-top: 22px;
  font-size: 19px;
  font-weight: 500;
  color: #cbd5f5;
}
.info span {
  font-size: 21px;
  font-weight: 700;
  color: #a5b4fc;
}
#stepText {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 6px;
  color: #e0e7ff;
}

/* ===== PSEUDOCODE ===== */
#pseudocode {
  width: 340px;
  margin: 25px auto;
  background: rgba(255,255,255,0.05);
  padding: 18px 20px;
  border-radius: 12px;
  text-align: left;
  border-left: 4px solid #6366f1;
  font-size: 15px;
  line-height: 2;
}
#pseudocode div { border-radius: 6px; padding: 2px 8px; }
.active {
  background: #6366f1;
  color: white;
  padding: 2px 8px;
  border-radius: 6px;
}

/* ===== LOG ===== */
#log-list {
  list-style: none;
  padding: 0;
  margin: 10px auto 0;
  max-width: 400px;
  max-height: 120px;
  overflow-y: auto;
  font-size: 15px;
  color: #94a3b8;
}
#log-list li { padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
#log-list li:last-child { color: #e2e8f0; font-weight: 600; }

.back { margin-top: 25px; }

@media(max-width:700px) {
  h1 { font-size: 28px; }
  .block { width: 100px; font-size: 13px; }
  .top-label { right: -50px; font-size: 11px; }
}
</style>
</head>
<body>
<div class="container">
  <h1>Stack Visualizer</h1>

  <div class="controls">
    <input id="valueInput" placeholder="Enter value to push" style="width:200px;">

    <button onclick="pushValue()">&#8679; Push</button>
    <button onclick="popValue()">&#8681; Pop</button>
    <button onclick="peekValue()">&#128065; Peek</button>
    <button onclick="resetStack()">&#x27F3; Reset</button>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-color" style="background:#38bdf8;"></div> Element</div>
    <div class="legend-item"><div class="legend-color" style="background:#a78bfa;"></div> Top (HEAD)</div>
    <div class="legend-item"><div class="legend-color" style="background:#34d399;"></div> Just Pushed</div>
    <div class="legend-item"><div class="legend-color" style="background:#f87171;"></div> Popping</div>
  </div>

  <div id="stack-container">
    <div>
      <div class="stack-column" id="stack-col"></div>
      <div class="stack-base"></div>
    </div>
  </div>

  <div class="info">
    <div id="stepText">Step: Waiting for operation</div>
    Stack Size: <span id="stackSize">0</span> &nbsp;|&nbsp;
    Operations: <span id="opCount">0</span>
  </div>

  <div id="pseudocode">
    <div id="l1">PUSH(x):</div>
    <div id="l2">&nbsp;&nbsp;top = top + 1</div>
    <div id="l3">&nbsp;&nbsp;stack[top] = x</div>
    <div id="l4">POP():</div>
    <div id="l5">&nbsp;&nbsp;value = stack[top]</div>
    <div id="l6">&nbsp;&nbsp;top = top - 1; return value</div>
    <div id="l7">PEEK():</div>
    <div id="l8">&nbsp;&nbsp;return stack[top]</div>
  </div>

  <ul id="log-list"></ul>

  <div class="back">
    <a href="/level3"><button>&#8592; Back </button></a>
  </div>
</div>

<script>
let stack = [];
let opCount = 0;

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function setStep(msg) { document.getElementById("stepText").innerText = "Step: " + msg; }

function updateStats() {
  document.getElementById("stackSize").innerText = stack.length;
  document.getElementById("opCount").innerText = opCount;
}

function addLog(msg) {
  const li = document.createElement("li");
  li.innerText = msg;
  const list = document.getElementById("log-list");
  list.appendChild(li);
  list.scrollTop = list.scrollHeight;
}

function highlight(id) {
  document.querySelectorAll("#pseudocode div").forEach(d => d.classList.remove("active"));
  const el = document.getElementById(id);
  if (el) el.classList.add("active");
}

function renderStack(highlightTop = "", highlightIdx = -1) {
  const col = document.getElementById("stack-col");
  col.innerHTML = "";

  stack.forEach((val, i) => {
    const block = document.createElement("div");
    block.className = "block";
    block.innerText = val;

    const isTop = i === stack.length - 1;

    if (highlightIdx === i) {
      block.classList.add(highlightTop);
    } else if (isTop) {
      block.classList.add("top-block");
    }

    if (isTop) {
      const label = document.createElement("div");
      label.className = "top-label";
      label.innerText = "TOP";
      block.appendChild(label);
    }

    col.appendChild(block);
  });
}

async function pushValue() {
  const input = document.getElementById("valueInput");
  const val = input.value.trim();
  if (val === "") return;

  highlight("l2");
  setStep(`Pushing "${val}" onto the stack`);
  stack.push(val);
  opCount++;
  renderStack("highlight-push", stack.length - 1);
  updateStats();
  addLog(`Pushed: ${val}`);
  input.value = "";

  await sleep(600);
  highlight("l3");
  renderStack();
}

async function popValue() {
  if (stack.length === 0) {
    setStep("Stack Underflow! Nothing to pop.");
    return;
  }

  highlight("l5");
  setStep(`Popping top element "${stack[stack.length - 1]}"`);
  renderStack("highlight-pop", stack.length - 1);
  await sleep(700);

  highlight("l6");
  const val = stack.pop();
  opCount++;
  renderStack();
  updateStats();
  addLog(`Popped: ${val}`);
  setStep(`Popped "${val}" from the stack`);
}

function peekValue() {
  if (stack.length === 0) {
    setStep("Stack is empty! Nothing to peek.");
    return;
  }

  highlight("l8");
  const val = stack[stack.length - 1];
  opCount++;
  renderStack("top-block", stack.length - 1);
  setStep(`Peek: Top element is "${val}"`);
  addLog(`Peek: ${val}`);
  updateStats();
}

function resetStack() {
  stack = [];
  opCount = 0;
  document.getElementById("stack-col").innerHTML = "";
  document.getElementById("log-list").innerHTML = "";
  document.getElementById("stackSize").innerText = "0";
  document.getElementById("opCount").innerText = "0";
  document.getElementById("stepText").innerText = "Step: Waiting for operation";
  document.querySelectorAll("#pseudocode div").forEach(d => d.classList.remove("active"));
}
</script>
</body>
</html>
