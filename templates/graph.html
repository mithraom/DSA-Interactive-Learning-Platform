<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graph Visualization</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  font-family: 'Poppins', 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b, #020617);
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  color: #e2e8f0;
  padding: 30px 0;
}
.container {
  background: rgba(255,255,255,0.05);
  padding: 40px;
  border-radius: 24px;
  box-shadow: 0 25px 70px rgba(0,0,0,0.7), inset 0 0 30px rgba(255,255,255,0.05);
  text-align: center;
  width: 95%;
  max-width: 1100px;
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.08);
}
h1 {
  font-size: 42px;
  font-weight: 600;
  margin-bottom: 20px;
  color: #e0e7ff;
  text-shadow: 0 4px 20px rgba(99,102,241,0.4);
}
input[type="text"] {
  padding: 13px 15px;
  margin: 6px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.08);
  color: #e2e8f0;
  font-size: 16px;
  outline: none;
  width: 180px;
  transition: 0.3s;
  font-family: 'Poppins', sans-serif;
}
input[type="text"]:focus { border-color: #6366f1; box-shadow: 0 0 15px rgba(99,102,241,0.5); }
input[type="text"]::placeholder { color: #94a3b8; }
input[type="range"] { width: 160px; vertical-align: middle; }
button {
  padding: 13px 26px;
  margin: 6px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, #6366f1, #06b6d4);
  color: white;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  font-weight: 600;
  font-size: 16px;
  font-family: 'Poppins', sans-serif;
}
button:hover { transform: translateY(-4px) scale(1.05); box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
.controls { margin-bottom: 20px; }
.controls label { font-size: 16px; color: #cbd5e1; }
canvas {
  margin-top: 20px;
  background: rgba(255,255,255,0.04);
  border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.7), inset 0 0 20px rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  display: block;
  margin-left: auto;
  margin-right: auto;
}
#pseudo {
  width: 600px;
  margin: 25px auto 0;
  background: rgba(255,255,255,0.05);
  padding: 20px 24px;
  border-radius: 18px;
  text-align: left;
  font-size: 16px;
  backdrop-filter: blur(18px);
  box-shadow: 0 15px 40px rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.08);
  border-left: 4px solid #6366f1;
  line-height: 2.2;
  color: #cbd5e1;
}
#pseudo p { margin: 2px 0; padding: 3px 8px; border-radius: 6px; }
.active { background: linear-gradient(135deg,#6366f1,#06b6d4); color: white !important; padding: 4px 10px; border-radius: 8px; }
.status-text {
  font-size: 20px;
  font-weight: 600;
  color: #22d3ee;
  margin: 12px 0;
  min-height: 28px;
}
.back { margin-top: 28px; }
</style>
</head>
<body>
<div class="container">
  <h1>Graph Visualization (BFS & DFS)</h1>

  <div class="controls">
    <input type="text" id="node1" placeholder="Node A">
    <input type="text" id="node2" placeholder="Node B">
    <br>
    <button onclick="addEdge()">➕ Add Edge</button>
    <button onclick="bfs()">▶ BFS</button>
    <button onclick="dfs()">▶ DFS</button>
    <button onclick="resetGraph()">⟳ Reset</button>
    <br><br>
    <label>Speed <input type="range" id="speed" min="200" max="1500" value="700"></label>
  </div>

  <div class="status-text" id="status"></div>

  <canvas id="canvas" width="900" height="450"></canvas>

  <div id="pseudo">
    <p id="p1">1. Start from source node</p>
    <p id="p2">2. Mark node as visited</p>
    <p id="p3">3. Add neighbors to queue / stack</p>
    <p id="p4">4. Repeat until all nodes visited</p>
  </div>

  <div class="back">
    <a href="/"><button>⬅ Back to Home</button></a>
  </div>
</div>

<script>
let graph = {}, positions = {}, visited = {};
let ctx = document.getElementById("canvas").getContext("2d");

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function getSpeed() { return 1600 - parseInt(document.getElementById("speed").value); }

function highlight(id) {
  document.querySelectorAll("#pseudo p").forEach(p => p.classList.remove("active"));
  const el = document.getElementById(id);
  if (el) el.classList.add("active");
}

function addEdge() {
  let a = document.getElementById("node1").value.trim();
  let b = document.getElementById("node2").value.trim();
  if (!a || !b) return;
  if (!graph[a]) graph[a] = [];
  if (!graph[b]) graph[b] = [];
  graph[a].push(b); graph[b].push(a);
  draw();
}

function draw() {
  ctx.clearRect(0, 0, 900, 450);
  let keys = Object.keys(graph), n = keys.length;
  if (!n) return;
  let cx=450, cy=220, r=170;
  for (let i=0; i<n; i++) {
    let angle = 2*Math.PI/n * i;
    positions[keys[i]] = { x: cx+r*Math.cos(angle), y: cy+r*Math.sin(angle) };
  }
  let drawn = new Set();
  for (let u in graph) {
    for (let v of graph[u]) {
      let key = u<v ? u+"-"+v : v+"-"+u;
      if (drawn.has(key)) continue;
      drawn.add(key);
      let p1=positions[u], p2=positions[v];
      ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y);
      ctx.strokeStyle="#64748b"; ctx.lineWidth=2; ctx.stroke();
    }
  }
  for (let node in positions) {
    let p = positions[node];
    let g = ctx.createLinearGradient(p.x-25,p.y-25,p.x+25,p.y+25);
    g.addColorStop(0,"#6366f1"); g.addColorStop(1,"#06b6d4");
    ctx.beginPath(); ctx.arc(p.x,p.y,28,0,Math.PI*2);
    ctx.fillStyle = visited[node] ? "#22d3ee" : g;
    ctx.fill();
    ctx.strokeStyle="#c7d2fe"; ctx.lineWidth=2; ctx.stroke();
    ctx.fillStyle="#fff"; ctx.font="bold 18px Poppins";
    ctx.textAlign="center"; ctx.fillText(node,p.x,p.y+6);
  }
}

async function bfs() {
  visited = {};
  let nodes = Object.keys(graph);
  if (!nodes.length) return;
  let queue=[], start=nodes[0];
  highlight("p1"); await sleep(getSpeed());
  queue.push(start); visited[start]=true;
  while (queue.length) {
    highlight("p2");
    let node = queue.shift();
    document.getElementById("status").innerText = "BFS visiting: " + node;
    draw(); await sleep(getSpeed());
    for (let nei of graph[node]) {
      if (!visited[nei]) {
        highlight("p3");
        visited[nei]=true; queue.push(nei);
        await sleep(getSpeed());
      }
    }
  }
  highlight("p4");
}

async function dfs() {
  visited = {};
  let nodes = Object.keys(graph);
  if (!nodes.length) return;
  await dfsUtil(nodes[0]);
  highlight("p4");
}
async function dfsUtil(node) {
  highlight("p2");
  visited[node]=true;
  document.getElementById("status").innerText = "DFS visiting: " + node;
  draw(); await sleep(getSpeed());
  for (let nei of graph[node]) {
    if (!visited[nei]) { highlight("p3"); await sleep(getSpeed()); await dfsUtil(nei); }
  }
}

function resetGraph() {
  graph={}; visited={}; positions={};
  ctx.clearRect(0,0,900,450);
  document.getElementById("status").innerText="";
  document.querySelectorAll("#pseudo p").forEach(p=>p.classList.remove("active"));
}
</script>
</body>
</html>
